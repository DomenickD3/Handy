name: "Build Test"

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows-x64
          - windows-arm64
          - macos-arm64
          - macos-x64
          - linux-x64-deb
          - linux-x64-appimage-rpm
          - linux-arm64

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Select build matrix
        id: matrix
        shell: bash
        run: |
          case "${{ inputs.build_target }}" in
            all)
              matrix='{"include":[{"platform":"macos-26","args":"--target aarch64-apple-darwin","target":"aarch64-apple-darwin"},{"platform":"macos-latest","args":"--target x86_64-apple-darwin","target":"x86_64-apple-darwin"},{"platform":"ubuntu-22.04","args":"--bundles deb","target":"x86_64-unknown-linux-gnu"},{"platform":"ubuntu-24.04","args":"--bundles appimage,rpm","target":"x86_64-unknown-linux-gnu"},{"platform":"ubuntu-24.04-arm","args":"--bundles appimage,deb,rpm","target":"aarch64-unknown-linux-gnu"},{"platform":"windows-latest","args":"","target":"x86_64-pc-windows-msvc"},{"platform":"windows-11-arm","args":"--target aarch64-pc-windows-msvc","target":"aarch64-pc-windows-msvc"}]}'
              ;;
            windows-x64)
              matrix='{"include":[{"platform":"windows-latest","args":"","target":"x86_64-pc-windows-msvc"}]}'
              ;;
            windows-arm64)
              matrix='{"include":[{"platform":"windows-11-arm","args":"--target aarch64-pc-windows-msvc","target":"aarch64-pc-windows-msvc"}]}'
              ;;
            macos-arm64)
              matrix='{"include":[{"platform":"macos-26","args":"--target aarch64-apple-darwin","target":"aarch64-apple-darwin"}]}'
              ;;
            macos-x64)
              matrix='{"include":[{"platform":"macos-latest","args":"--target x86_64-apple-darwin","target":"x86_64-apple-darwin"}]}'
              ;;
            linux-x64-deb)
              matrix='{"include":[{"platform":"ubuntu-22.04","args":"--bundles deb","target":"x86_64-unknown-linux-gnu"}]}'
              ;;
            linux-x64-appimage-rpm)
              matrix='{"include":[{"platform":"ubuntu-24.04","args":"--bundles appimage,rpm","target":"x86_64-unknown-linux-gnu"}]}'
              ;;
            linux-arm64)
              matrix='{"include":[{"platform":"ubuntu-24.04-arm","args":"--bundles appimage,deb,rpm","target":"aarch64-unknown-linux-gnu"}]}'
              ;;
            *)
              echo "Unknown build_target: ${{ inputs.build_target }}"
              exit 1
              ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-test:
    needs: prepare-matrix
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      asset-prefix: "handy-test"
      upload-artifacts: true
      is-debug-build: ${{ contains(matrix.args, '--debug') }}
    secrets: inherit
